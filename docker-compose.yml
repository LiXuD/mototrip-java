  #     timeout: 5s
  #     retries: 5

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: mototrip-redis
    platform: linux/arm64
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos 2.2.3 (使用嵌入式 Derby 数据库)
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: mototrip-nacos
    platform: linux/amd64
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # RocketMQ NameServer
  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: mototrip-rocketmq-namesrv
    platform: linux/amd64
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep mqnamesrv | grep -v grep"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # RocketMQ Broker
  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: mototrip-rocketmq-broker
    platform: linux/amd64
    environment:
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876 --enable-proxy
    ports:
      - "10911:10911"
      - "10909:10909"
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep mqbroker | grep -v grep"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy

  # RocketMQ Dashboard (可选)
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:1.0.0
    container_name: mototrip-rocketmq-dashboard
    platform: linux/amd64
    environment:
      JAVA_OPTS: "-Xmx256m"
      rocketmq.config.namesrvAddr: rocketmq-namesrv:9876
    ports:
      - "18080:8080"
    depends_on:
      - rocketmq-broker

  # Sentinel Dashboard
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: mototrip-sentinel
    platform: linux/amd64
    ports:
      - "8858:8858"
    environment:
      JAVA_OPTS: "-Xms256m -Xmx256m"

volumes:
  # postgres-data: (已禁用 - 使用本地数据库)
  redis-data:
  nacos-data:
