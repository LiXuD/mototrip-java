server:
  port: 8080

spring:
  application:
    name: mototrip-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: true
        register-enabled: true
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: false
        import-check:
          enabled: false
    gateway:
      routes:
        # 认证服务通用路由（用于 Knife4j 文档）
        - id: auth-service-general
          uri: lb://mototrip-auth-server
          predicates:
            - Path=/mototrip-auth-server/**
          filters:
            - StripPrefix=1

        # 用户中心通用路由（用于 Knife4j 文档）
        - id: user-center-general
          uri: lb://mototrip-user-center
          predicates:
            - Path=/mototrip-user-center/**
          filters:
            - StripPrefix=1

        # 路线服务通用路由（用于 Knife4j 文档）
        - id: route-service-general
          uri: lb://mototrip-route-service
          predicates:
            - Path=/mototrip-route-service/**
          filters:
            - StripPrefix=1

        # 旅行服务通用路由（用于 Knife4j 文档）
        - id: trip-service-general
          uri: lb://mototrip-trip-service
          predicates:
            - Path=/mototrip-trip-service/**
          filters:
            - StripPrefix=1

        # 社交服务通用路由（用于 Knife4j 文档）
        - id: social-service-general
          uri: lb://mototrip-social-service
          predicates:
            - Path=/mototrip-social-service/**
          filters:
            - StripPrefix=1

        # 地图安全服务通用路由（用于 Knife4j 文档）
        - id: map-safety-service-general
          uri: lb://mototrip-map-safety-service
          predicates:
            - Path=/mototrip-map-safety-service/**
          filters:
            - StripPrefix=1

        # 团队服务通用路由（用于 Knife4j 文档）
        - id: team-service-general
          uri: lb://mototrip-team-service
          predicates:
            - Path=/mototrip-team-service/**
          filters:
            - StripPrefix=1

        # 天气服务通用路由（用于 Knife4j 文档）
        - id: weather-service-general
          uri: lb://mototrip-weather-service
          predicates:
            - Path=/mototrip-weather-service/**
          filters:
            - StripPrefix=1

        # 认证服务路由
        - id: auth-service
          uri: lb://mototrip-auth-server
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # 用户中心路由
        - id: user-center
          uri: lb://mototrip-user-center
          predicates:
            - Path=/api/users/**,/api/user-mode/**
          filters:
            - StripPrefix=1

        # 路线服务路由
        - id: route-service
          uri: lb://mototrip-route-service
          predicates:
            - Path=/api/routes/**,/api/waypoints/**,/api/reviews/**
          filters:
            - StripPrefix=1

        # 旅行服务路由
        - id: trip-service
          uri: lb://mototrip-trip-service
          predicates:
            - Path=/api/trips/**,/api/diaries/**,/api/preparations/**,/api/shares/**
          filters:
            - StripPrefix=1

        # 社交服务路由
        - id: social-service
          uri: lb://mototrip-social-service
          predicates:
            - Path=/api/posts/**,/api/footprints/**
          filters:
            - StripPrefix=1

        # 地图安全服务路由
        - id: map-safety-service
          uri: lb://mototrip-map-safety-service
          predicates:
            - Path=/api/maps/**,/api/danger-zones/**,/api/no-parking-zones/**,/api/warnings/**,/api/locations/**
          filters:
            - StripPrefix=1

        # 团队服务路由
        - id: team-service
          uri: lb://mototrip-team-service
          predicates:
            - Path=/api/teams/**
          filters:
            - StripPrefix=1

        # 天气服务路由
        - id: weather-service
          uri: lb://mototrip-weather-service
          predicates:
            - Path=/api/weather/**
          filters:
            - StripPrefix=1
    sentinel:
      transport:
        dashboard: localhost:8858
      scg:
        fallback:
          mode: response
          response-status: 429
          response-body: '{"code":429,"message":"请求过于频繁，请稍后再试"}'

jwt:
  secret: ${JWT_SECRET:mototrip-jwt-secret-key-must-be-at-least-256-bits-for-hs256-algorithm}

knife4j:
  enable: ${KNIFE4J_ENABLE:true}
  setting:
    language: zh_cn
  gateway:
    enabled: ${KNIFE4J_GATEWAY_ENABLE:true}
    strategy: discover
    discover:
      enabled: true
      version: openapi3
      excluded-services:
        - mototrip-gateway


